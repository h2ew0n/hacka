{% extends 'deliverys/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'deliverys/css/learn_mission.css' %}">
{% endblock %}

{% block stage_list %}{% endblock %}
{% block guide %}{% endblock %}

{% block mobile_ui %}
<button type="button" class="guide-toggle-button" onclick="toggleGuide()">
    <span id="guide-toggle-label">설명 끄기</span>
</button>

<h1 class="mission-title">미션 제시!</h1>

<div class="mission-card">
    <p class="mission-text">
        미션:<br>{{ store }}에서 {{ menu }}의 {{ count }}인분을 주문해보세요!
    </p>
    <!-- {% if extra %}
    <p class = "mission-extra">
        추가 메뉴: {{ extra }}
    </p>
    {% endif %} -->
</div>

<a href="{% url 'deliverys:learn_search' %}" class="start-button">
    <span>시작</span>
</a>

{% endblock %}
